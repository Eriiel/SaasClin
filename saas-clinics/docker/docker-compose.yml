version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinics_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinics_pass}
      POSTGRES_DB: ${POSTGRES_DB:-saas_clinics}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-clinics_user}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
